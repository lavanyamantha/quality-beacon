version: '3.8'

services:
  # ── Proxy Server (holds credentials) ──
  proxy:
    build: ./server
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    restart: unless-stopped

  # ── Frontend (React app) ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - VITE_PROXY_URL=http://proxy:3001
    depends_on:
      - proxy
    restart: unless-stopped
